name: emolor_flutter
description: EmoLor Flutter Application - Emotional Learning for Children
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utils
  uuid: ^4.3.3
  crypto: ^3.0.3
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  
  # Fonts & Charts & Effects
  google_fonts: ^6.1.0
  fl_chart: ^1.1.1
  confetti: ^0.7.0
  flutter_svg: ^2.0.9

  # Accessibility – Text-to-Speech (UCD015)
  flutter_tts: ^4.2.0

  # File picking (UCD019)
  file_picker: ^8.0.0

  # URL launching (UCD030 – open media files)
  url_launcher: ^6.2.5

  # UCD032 – Download Media
  permission_handler: ^11.3.0
  dio: ^5.4.1
  path_provider: ^2.1.2
  gal: ^2.3.0

  # UCD045 – Report Generation (PDF / CSV)
  pdf: ^3.11.1
  printing: ^5.13.3
  csv: ^6.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Add assets if needed
  assets:
    - assets/images/
